version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: psychouser
      POSTGRES_PASSWORD: psychopassword
      POSTGRES_DB: psychodb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=postgresql://psychouser:psychopassword@db:5432/psychodb
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretjwtkey123
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: ./backend
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://psychouser:psychopassword@db:5432/psychodb
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretjwtkey123
    depends_on:
      - db
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
